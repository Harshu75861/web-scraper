<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Data Scraper</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #181818;
      background: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: min(680px, 100%);
      text-align: center;
      background: #ffffff;
      border: 1px solid #e4e7ee;
      border-radius: 8px;
      padding: 48px 32px;
      box-shadow: 0 18px 45px rgba(20, 28, 45, 0.08);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 36px;
      line-height: 1.15;
    }

    h3 {
      margin: 30px 0 10px;
      font-size: 20px;
    }

    p {
      margin: 0;
      color: #4d5666;
      font-size: 17px;
      line-height: 1.6;
    }

    .price {
      color: #181818;
      font-size: 22px;
      font-weight: 700;
    }

    button {
      margin: 28px 0 18px;
      padding: 12px 24px;
      background: #111111;
      color: #ffffff;
      border: 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #333333;
    }

    .contact {
      font-weight: 700;
      color: #181818;
    }
  </style>
</head>
<body>
  <main>
    <h1>Website Data Scraper</h1>
    <p>I extract data from websites into clean Excel/CSV files.</p>

    <h3>What I can scrape:</h3>
    <p>Products • Prices • Emails • Leads • Listings</p>

    <h3 class="price">Starting from ₹500</h3>

    <button type="button" onclick="window.location.href='mailto:your@email.com'">
      Contact Me
    </button>

    <p>Or WhatsApp: <span class="contact">+91XXXXXXXXXX</span></p>
  </main>
</body>
</html>
